<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Devocional Diário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/mensagem.css" />
</head>
<body>
  <div class="background"></div>

  <div class="app-container">

    <!-- Header -->
    <header class="app-header">
      <img src="/img/logo.png" alt="Logo" class="logo-img" />
      <div class="page-dots" id="pageDots">
        <span class="pdot active" data-page="0"></span>
        <span class="pdot" data-page="1" id="dotVideo"></span>
      </div>
    </header>

    <!-- Skeleton loader -->
    <div class="card skeleton-card" id="skeletonCard">
      <div class="sk-block sk-date"></div>
      <div class="sk-block sk-title"></div>
      <div class="sk-block sk-verse"></div>
      <div class="sk-block sk-verse sm"></div>
      <div class="sk-block sk-label"></div>
      <div class="sk-block sk-text"></div>
      <div class="sk-block sk-text sm"></div>
      <div class="sk-block sk-label"></div>
      <div class="sk-block sk-text"></div>
      <div class="sk-block sk-text sm"></div>
    </div>

    <!-- Erro -->
    <div class="card error-card hidden" id="errorCard">
      <div class="error-icon">🕊️</div>
      <h2>Devocional não disponível</h2>
      <p>O devocional de hoje ainda não foi publicado. Volte mais tarde ou entre em contato com a equipe.</p>
      <button class="btn-retry" onclick="carregarDevocional()">Tentar novamente</button>
    </div>

    <!-- Slider de páginas -->
    <div class="slider-viewport hidden" id="sliderViewport">
      <div class="slider-track" id="sliderTrack">

        <!-- Página 1: Devocional -->
        <div class="slide" id="slideDevo">
          <main class="card devocional-card" id="devocionalCard">

            <div class="card-hero">
              <div class="card-date" id="cardDate">• carregando •</div>
              <div class="versiculo-ref" id="versiculoRef">—</div>
              <blockquote class="versiculo-texto" id="versiculoTexto"></blockquote>
            </div>

            <div class="card-body">
              <div class="card-section">
                <div class="section-label">
                  <span class="section-label-text" id="labelReflexao">Reflexão</span>
                  <div class="section-label-line"></div>
                </div>
                <p class="section-body" id="reflexao">—</p>
              </div>

              <div class="ornament">· · ·</div>

              <div class="card-section">
                <div class="section-label">
                  <span class="section-label-text" id="labelPratica">Prática</span>
                  <div class="section-label-line"></div>
                </div>
                <p class="section-body" id="pratica">—</p>
              </div>

              <div class="tema-badge" id="temaBadge"></div>
            </div>

          </main>

          <button class="video-arrow" id="videoArrow" onclick="irParaVideo()" aria-label="Ver mais">
            <div class="video-arrow-inner">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="9 18 15 12 9 6"/>
              </svg>
              <span>Vídeo</span>
            </div>
          </button>
        </div>

        <!-- Página 2: Vídeo + Conteúdo -->
        <div class="slide" id="slideVideo">
          <div class="card video-card">

            <div class="card-hero video-hero">
              <div class="card-date" id="videoDate">—</div>
              <div class="versiculo-ref" id="videoRef">—</div>
            </div>

            <div class="card-body">

              <!-- Vídeo (só aparece quando tem youtube_id) -->
              <div id="videoSection" class="hidden">
                <div class="video-section-label"><span>Devocional em Vídeo</span></div>
                <div class="video-wrapper">
                  <iframe id="youtubePlayer" src="" frameborder="0"
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                    allowfullscreen loading="lazy"></iframe>
                </div>
              </div>

              <!-- Links do Devocional -->
              <div class="slide2-section hidden" id="linksDevocionalSection">
                <div class="section-label" style="margin-bottom:14px">
                  <span class="section-label-text">Links</span>
                  <div class="section-label-line"></div>
                </div>
                <div class="links-grid" id="linksDevocionalLista"></div>
              </div>

              <!-- Redes Sociais -->
              <div class="slide2-section">
                <div class="section-label" style="margin-bottom:14px">
                  <span class="section-label-text">Redes Sociais</span>
                  <div class="section-label-line"></div>
                </div>
                <div class="links-grid" id="linksSociais"></div>
              </div>

              <!-- Inscrições -->
              <div class="slide2-section" id="inscricoesSection">
                <div class="section-label" style="margin-bottom:14px">
                  <span class="section-label-text">Inscrições</span>
                  <div class="section-label-line"></div>
                </div>
                <div id="linksEventos"></div>
              </div>

              <!-- Comunicados -->
              <div class="slide2-section" id="anunciosSection">
                <div class="section-label" style="margin-bottom:14px">
                  <span class="section-label-text">Comunicados</span>
                  <div class="section-label-line"></div>
                </div>
                <div id="anunciosLista"></div>
              </div>

            </div>
          </div>

          <button class="back-arrow" onclick="irParaDevo()" aria-label="Voltar">
            <div class="video-arrow-inner">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              <span>Texto</span>
            </div>
          </button>
        </div>

      </div><!-- slider-track -->
    </div><!-- slider-viewport -->

    <!-- Botões de ação -->
    <footer class="card-actions" id="cardActions">
      <button class="action-btn" onclick="compartilhar()" title="Compartilhar">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
        </svg>
      </button>
      <button class="action-btn" onclick="copiarVersiculo()" title="Copiar versículo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
          <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
        </svg>
      </button>
      <button class="action-btn" onclick="navegarData(-1)" title="Dia anterior">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <button class="action-btn" onclick="navegarData(1)" title="Próximo dia" id="btnProximo">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>
    </footer>

    <div class="deslize-hint">Aproxime sua pulseira para receber a mensagem do dia</div>

  </div>

  <div class="toast" id="toast"></div>
  <script src="/js/mensagem.js"></script>
</body>
</html>
